<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagine AI</title>
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <!-- Auth Container -->
    <div id="authContainer" class="auth-container">
        <div class="auth-box auth-box-alt">
            <div class="auth-header">
                <span class="auth-logo">Imagine AI</span>
                <h1 id="authTitle" class="gradient-text" style="font-size: 2.5rem; margin-top: 0.5rem; text-align: left;">Register</h1>
            </div>

            <form id="authForm" class="auth-form auth-form-alt">
                <div class="input-group">
                    <label for="emailInput">Email</label>
                    <input type="email" id="emailInput" placeholder="username@gmail.com" required autocomplete="email">
                </div>
                
                <div class="input-group">
                    <label for="passwordInput">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="passwordInput" placeholder="Password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" title="Toggle Password Visibility">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="primary-btn signin-btn" id="authSubmitBtn">Register</button>
                <div id="authError" class="error-message hidden"></div>
            </form>

            <div class="auth-divider">
                <span>or continue with</span>
            </div>

            <div class="social-login-container">
                <div id="googleSignInDiv" class="social-btn-wrapper"></div>
                <div id="googleAuthSetupMsg" class="error-message hidden" style="font-size: 0.8rem; margin-top: 5px; text-align: center;">
                    Google Auth not configured. Add GOOGLE_CLIENT_ID to .env
                </div>
            </div>

            <div class="auth-footer">
                <span id="authSwitchText">Already have an account?</span> 
                <a href="#" id="authSwitchLink">Sign in</a>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div id="appContainer" class="app-layout hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <button id="newChatBtn" class="new-chat-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Chat
            </button>
            <button id="myGalleryBtn" class="new-chat-btn" style="margin-top: 10px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-glass);">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                My Gallery
            </button>
            <div class="sidebar-scroll">
                <ul id="chatSessionsList" class="session-list">
                    <!-- Sessions injected here -->
                </ul>
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar user-avatar" id="userAvatar">U</div>
                    <span id="userNameDisplay">User</span>
                </div>
                <button id="logoutBtn" class="logout-btn" title="Logout">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div id="chatHistory" class="chat-history">
                <div class="message assistant welcome-message">
                    <div class="message-inner">
                        <div class="avatar">AI</div>
                        <div class="message-content">
                            <p>Hello! I am your AI assistant. Tell me what you'd like to see, in any language.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chat-controls">
                <div class="chat-controls-inner">
                    <div class="style-toggle-container">
                        <div class="quick-styles" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; align-items: center;">
                            <button class="style-btn" data-style="realistic">Realistic</button>
                            <button class="style-btn" data-style="cartoon">Cartoon</button>
                            <button class="style-btn" data-style="anime">Anime</button>
                            <button id="toggleStylesBtn" class="action-btn" title="More Styles" style="margin: 0; border-radius: 20px; background: rgba(0,0,0,0.5);">
                                More Styles <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:4px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </button>
                        </div>
                        <div class="style-selector hidden" id="styleSelector">
                            <button class="style-btn" data-style="imaginary">Imaginary</button>
                            <button class="style-btn" data-style="black_white">Black & White</button>
                            <button class="style-btn" data-style="cyberpunk">Cyberpunk</button>
                            <button class="style-btn" data-style="watercolor">Watercolor</button>
                            <button class="style-btn" data-style="oil_painting">Oil Painting</button>
                            <button class="style-btn" data-style="pixel_art">Pixel Art</button>
                            <button class="style-btn" data-style="origami">Origami</button>
                        </div>
                    </div>

                    <div class="input-area">
                        <textarea 
                            id="promptInput" 
                            placeholder="Message Imagine AI..."
                            rows="1"
                        ></textarea>
                        <button id="generateBtn" class="send-btn" title="Send">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Gallery Modal -->
    <div id="galleryModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>My Saved Gallery</h2>
                <button class="close-modal" id="closeGalleryBtn">&times;</button>
            </div>
            <div class="modal-body" id="galleryGrid">
                <!-- Saved images injected here -->
            </div>
        </div>
    </div>

    <!-- Photo Editor Modal -->
    <div id="editorModal" class="modal hidden">
        <div class="modal-content editor-content">
            <div class="modal-header">
                <h2>Photo Editor (Mini Canva)</h2>
                <button class="close-modal" id="closeEditorBtn">&times;</button>
            </div>
            <div class="modal-body editor-body">
                <canvas id="editorCanvas" style="max-width: 100%; max-height: 50vh; border-radius: 8px; border: 1px solid var(--border-glass);"></canvas>
                <div class="editor-controls" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 10px;">
                    <div>
                        <label>Hue (Color)</label>
                        <input type="range" id="editHue" min="0" max="360" value="0">
                    </div>
                    <div>
                        <label>Brightness</label>
                        <input type="range" id="editBrightness" min="50" max="150" value="100">
                    </div>
                    <div>
                        <label>Contrast</label>
                        <input type="range" id="editContrast" min="50" max="150" value="100">
                    </div>
                    <div>
                        <label>Saturation</label>
                        <input type="range" id="editSaturation" min="0" max="200" value="100">
                    </div>
                </div>
                <div style="width: 100%; display: flex; gap: 10px; margin-top: 15px;">
                    <button id="resetEditBtn" class="action-btn" style="flex: 1; justify-content: center;">Reset</button>
                    <button id="applyEditBtn" class="primary-btn" style="flex: 2;">Save Edited Image</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
